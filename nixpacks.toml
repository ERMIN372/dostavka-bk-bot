# Конфиг сборки для Railway (Nixpacks).
#
# Единственное, что нам нужно доопределить, — СИСТЕМНЫЕ пакеты OCR: pytesseract
# требует бинарник tesseract и русский языковой пакет. Добавляем их к фазе setup.
#
# Установку Python-зависимостей и запуск НЕ переопределяем: Nixpacks сам
# детектит requirements.txt, создаёт venv и ставит зависимости через pip
# (если переопределить install своим `pip install`, pip окажется не на PATH —
# именно из-за этого падала сборка). Стартовая команда берётся из railway.json
# (startCommand = "python main.py") / Procfile.
[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-rus"]
